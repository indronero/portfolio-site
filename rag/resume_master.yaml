      - Software Engineer specializing in AI/ML, NLP, and full-stack development. Spearheading the Python AI Delivery Team at Clover Infotech, deploying services like an NLP document analyzer and RAG-based chatbot (58% faster reviews). Leveraging Python, MySQL, Django, React, Azure, and PyTorch to automate workflows, boost revenue (Rs.500k+), and drive operational efficiency through custom AI solutions.
